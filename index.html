<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI 画图工坊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface-2: #242424;
  --surface-3: #2e2e2e;
  --border: rgba(255,255,255,.08);
  --border-light: rgba(255,255,255,.12);
  --text: #e8e8e8;
  --text-2: #a0a0a0;
  --text-3: #666;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,.15);
  --accent-soft: rgba(99,102,241,.08);
  --green: #22c55e;
  --radius: 16px;
  --radius-lg: 24px;
  --font-display: 'DM Sans', 'Noto Sans SC', system-ui, sans-serif;
  --font-body: 'Noto Sans SC', 'DM Sans', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: grid;
  grid-template-rows: 1fr auto;
  height: 100vh;
  max-width: 820px;
  margin: 0 auto;
  position: relative;
}

/* ── Conversation ── */
.conversation {
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 20px 32px;
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--surface-3) transparent;
}
.conversation::-webkit-scrollbar { width: 6px; }
.conversation::-webkit-scrollbar-track { background: transparent; }
.conversation::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

/* ── Empty State ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 400px;
  text-align: center;
  animation: fadeIn .6s ease;
}
.empty-icon {
  width: 72px; height: 72px;
  border-radius: 22px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: grid; place-items: center;
  font-size: 32px;
  box-shadow: 0 12px 40px var(--accent-glow);
  margin-bottom: 24px;
}
.empty-state h2 {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.02em;
  margin-bottom: 8px;
  color: var(--text);
}
.empty-state p {
  color: var(--text-2);
  font-size: 14px;
  max-width: 360px;
  line-height: 1.5;
}
.presets {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 28px;
}
.preset {
  padding: 8px 16px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s ease;
  font-family: var(--font-body);
}
.preset:hover {
  background: var(--surface-2);
  border-color: var(--border-light);
  color: var(--text);
  transform: translateY(-1px);
}

/* ── Messages ── */
.message {
  margin-bottom: 28px;
  animation: msgIn .4s ease both;
}
.message.user { display: flex; justify-content: flex-end; }
.message.user .bubble {
  background: var(--accent);
  color: #fff;
  border-radius: 20px 20px 4px 20px;
  padding: 12px 18px;
  max-width: 75%;
  font-size: 15px;
  line-height: 1.55;
  font-weight: 400;
}
.message.assistant { display: flex; gap: 12px; align-items: flex-start; }
.avatar {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: grid; place-items: center;
  font-size: 15px;
  flex-shrink: 0;
  margin-top: 2px;
}
.assistant-content {
  flex: 1;
  min-width: 0;
}
.assistant-text {
  color: var(--text-2);
  font-size: 14px;
  margin-bottom: 10px;
}
.image-card {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  max-width: 520px;
  animation: imageReveal .8s ease both;
}
.image-card img {
  width: 100%;
  display: block;
  cursor: zoom-in;
  transition: transform .3s ease;
}
.image-card img:hover { transform: scale(1.01); }
.image-actions {
  display: flex;
  gap: 6px;
  padding: 10px 12px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.img-btn {
  padding: 6px 14px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s ease;
  font-family: var(--font-body);
}
.img-btn:hover { background: var(--surface-3); color: var(--text); }
.img-btn.accent { background: var(--accent-soft); color: var(--accent); border-color: rgba(99,102,241,.2); }
.img-btn.accent:hover { background: var(--accent-glow); }

/* ── Generating indicator ── */
.generating {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
}
.gen-dots {
  display: flex;
  gap: 5px;
}
.gen-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  animation: bounce 1.4s ease-in-out infinite;
}
.gen-dots span:nth-child(2) { animation-delay: .15s; }
.gen-dots span:nth-child(3) { animation-delay: .3s; }
.gen-text {
  color: var(--text-3);
  font-size: 13px;
  font-style: italic;
}

/* ── Input Bar ── */
.input-bar {
  padding: 12px 20px 20px;
  background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
  position: relative;
}
.input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 6px 6px 18px;
  transition: border-color .2s ease, box-shadow .2s ease;
}
.input-wrap:focus-within {
  border-color: rgba(99,102,241,.4);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.input-wrap textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.5;
  resize: none;
  outline: none;
  padding: 8px 0;
  max-height: 150px;
  min-height: 24px;
}
.input-wrap textarea::placeholder { color: var(--text-3); }
.send-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--accent);
  border: none;
  color: white;
  cursor: pointer;
  display: grid; place-items: center;
  transition: all .2s ease;
  flex-shrink: 0;
}
.send-btn:hover { background: #7c7ff7; transform: scale(1.05); }
.send-btn:disabled { opacity: .3; cursor: default; transform: none; }
.send-btn svg { width: 18px; height: 18px; }

.input-hint {
  text-align: center;
  color: var(--text-3);
  font-size: 11px;
  margin-top: 8px;
}

/* ── Header ── */
.top-bar {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 820px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  z-index: 10;
  background: linear-gradient(180deg, var(--bg) 60%, transparent);
  pointer-events: none;
}
.top-bar > * { pointer-events: auto; }
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: grid; place-items: center;
  font-size: 14px;
}
.brand-name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -.02em;
}
.top-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-2);
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 14px;
  transition: all .15s ease;
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); }

/* ── Settings Panel ── */
.settings-panel {
  position: fixed;
  top: 52px;
  right: calc(50% - 390px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  width: 240px;
  z-index: 20;
  display: none;
  animation: fadeSlide .2s ease;
  box-shadow: 0 16px 48px rgba(0,0,0,.4);
}
.settings-panel.show { display: block; }
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.setting-row:last-child { margin-bottom: 0; }
.setting-label {
  font-size: 13px;
  color: var(--text-2);
}
.setting-row select, .setting-row input {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 4px 8px;
  font-size: 13px;
  font-family: var(--font-body);
  outline: none;
  width: 120px;
}

/* ── Lightbox ── */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.88);
  backdrop-filter: blur(20px);
  display: none;
  place-items: center;
  z-index: 100;
  cursor: zoom-out;
}
.lightbox.show { display: grid; }
.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 12px;
  box-shadow: 0 24px 80px rgba(0,0,0,.5);
  animation: lbIn .3s ease;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  opacity: 0;
  pointer-events: none;
  padding: 10px 18px;
  border-radius: 999px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  z-index: 50;
  transition: .2s ease;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Error ── */
.error-msg {
  background: rgba(239,68,68,.08);
  border: 1px solid rgba(239,68,68,.2);
  border-radius: 12px;
  padding: 12px 16px;
  color: #f87171;
  font-size: 13px;
  max-width: 520px;
}

/* ── Animations ── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes imageReveal { from { opacity: 0; transform: scale(.97) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes bounce { 0%, 80%, 100% { transform: scale(.6); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }
@keyframes fadeSlide { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
@keyframes lbIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }

/* ── Responsive ── */
@media (max-width: 860px) {
  .settings-panel { right: 12px; }
}
@media (max-width: 600px) {
  .empty-state h2 { font-size: 22px; }
  .presets { gap: 6px; }
  .preset { font-size: 12px; padding: 6px 12px; }
  .message.user .bubble { max-width: 88%; }
  .image-card { max-width: 100%; }
}

/* ── Exhibit mode overrides ── */
.exhibit .top-actions { display: none; }
.exhibit .input-hint { display: none; }
.exhibit .preset { font-size: 14px; padding: 10px 18px; }
</style>
</head>
<body>

<div class="app">
  <div class="top-bar">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <span class="brand-name">AI 画图工坊</span>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="settingsBtn" title="设置">⚙</button>
      <button class="icon-btn" id="clearBtn" title="新对话">✕</button>
    </div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="setting-row">
      <span class="setting-label">比例</span>
      <select id="size">
        <option value="1536x1024">3:2 横图</option>
        <option value="1024x1024">1:1 方图</option>
        <option value="1024x1536">2:3 竖图</option>
        <option value="1920x1080">16:9 封面</option>
      </select>
    </div>
    <div class="setting-row">
      <span class="setting-label">质量</span>
      <select id="quality">
        <option value="high">高质量</option>
        <option value="medium">标准</option>
        <option value="low">快速</option>
      </select>
    </div>
    <div class="setting-row">
      <span class="setting-label">增强</span>
      <select id="enhance">
        <option value="on">开启</option>
        <option value="off">关闭</option>
      </select>
    </div>
  </div>

  <div class="conversation" id="conversation">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <h2>用文字生成图片</h2>
      <p>描述你想生成的画面，AI 会帮你画出来。</p>
      <div class="presets">
        <button class="preset">星空下的城市</button>
        <button class="preset">可爱的机器猫</button>
        <button class="preset">赛博朋克少女</button>
        <button class="preset">水墨山水画</button>
        <button class="preset">未来城市夜景</button>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="描述你想生成的画面…"></textarea>
      <button class="send-btn" id="sendBtn" title="生成">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
  </div>
</div>

<div class="lightbox" id="lightbox"><img id="lbImg" alt="" /></div>
<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
const $$ = (s) => [...document.querySelectorAll(s)];

const conv = $("#conversation");
const input = $("#input");
const sendBtn = $("#sendBtn");
const emptyState = $("#emptyState");
const toast = $("#toast");
const lightbox = $("#lightbox");
const lbImg = $("#lbImg");

let generating = false;
const isExhibit = new URLSearchParams(location.search).has("exhibit");
if (isExhibit) document.body.classList.add("exhibit");

const presetTexts = {
  "星空下的城市": "璀璨星空下的未来城市，霓虹灯映照在高楼玻璃幕墙上，赛博朋克风格，高清细节，电影感构图",
  "可爱的机器猫": "一只圆滚滚的可爱机器猫，金属质感，大眼睛，柔和灯光，日式插画风格，背景纯色",
  "赛博朋克少女": "赛博朋克风格的少女，紫色和蓝色霓虹光影，穿着高科技外套，雨夜街道，电影级画质",
  "水墨山水画": "中国水墨山水画，远山近水，白鹤飞翔，留白构图，传统笔触，宣纸质感",
  "未来城市夜景": "未来城市夜景，飞行汽车穿梭在摩天大楼之间，全息广告牌，科幻光影，超高细节",
};

const LOADING_MSGS = [
  "AI 正在理解你的描述...",
  "正在构思画面布局...",
  "正在绘制细节...",
  "即将完成...",
];

function resolveEndpoint(path) {
  const base = location.origin.replace(/\/$/, "");
  if (/\/\.netlify\/functions\/proxy$/i.test(base)) {
    if (path === "/v1/images/generations") return `${base}?route=generate`;
    if (path === "/config") return `${base}?route=config`;
    return base + path;
  }
  return base + path;
}

function enhance(text) {
  if ($("#enhance").value === "off") return text;
  const suffix = "，极简构图，纯白通透界面，柔和光感，大面积留白，精致阴影，高清细节，商业级产品视觉，无文字，无水印，无杂乱背景";
  return text.includes("高清细节") ? text : text + suffix;
}

function showToast(text) {
  toast.textContent = text;
  toast.classList.add("show");
  clearTimeout(showToast.t);
  showToast.t = setTimeout(() => toast.classList.remove("show"), 2000);
}

function scrollToBottom() {
  conv.scrollTop = conv.scrollHeight;
}

function autoResize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 150) + "px";
}

function addUserMsg(text) {
  if (emptyState) emptyState.remove();
  const div = document.createElement("div");
  div.className = "message user";
  div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  conv.appendChild(div);
  scrollToBottom();
}

function addGenerating() {
  const div = document.createElement("div");
  div.className = "message assistant";
  div.id = "genMsg";
  div.innerHTML = `
    <div class="avatar">✦</div>
    <div class="assistant-content">
      <div class="generating">
        <div class="gen-dots"><span></span><span></span><span></span></div>
        <span class="gen-text" id="genText">${LOADING_MSGS[0]}</span>
      </div>
    </div>`;
  conv.appendChild(div);
  scrollToBottom();
  let i = 0;
  const iv = setInterval(() => {
    i = (i + 1) % LOADING_MSGS.length;
    const el = $("#genText");
    if (el) el.textContent = LOADING_MSGS[i];
  }, 3000);
  return iv;
}

function removeGenerating() {
  const el = $("#genMsg");
  if (el) el.remove();
}

function addResultMsg(imgUrl) {
  const div = document.createElement("div");
  div.className = "message assistant";
  div.innerHTML = `
    <div class="avatar">✦</div>
    <div class="assistant-content">
      <div class="assistant-text">已为你生成图片</div>
      <div class="image-card">
        <img src="${imgUrl}" alt="AI 生成图片" onclick="openLightbox(this.src)" />
        <div class="image-actions">
          <button class="img-btn accent" onclick="downloadImg('${imgUrl.replace(/'/g, "\\'")}')">下载图片</button>
          <button class="img-btn" onclick="openLightbox(document.querySelector('.image-card:last-of-type img')?.src)">查看大图</button>
        </div>
      </div>
    </div>`;
  conv.appendChild(div);
  scrollToBottom();
  scheduleReset();
}

function addErrorMsg(msg) {
  const div = document.createElement("div");
  div.className = "message assistant";
  div.innerHTML = `
    <div class="avatar">✦</div>
    <div class="assistant-content">
      <div class="error-msg">${escHtml(msg)}</div>
    </div>`;
  conv.appendChild(div);
  scrollToBottom();
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function isValidUrl(u) {
  return typeof u === "string" && (u.startsWith("https://") || u.startsWith("http://") || u.startsWith("data:image/"));
}

async function generateImage(prompt) {
  const response = await fetch(resolveEndpoint("/v1/images/generations"), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "gpt-image-2",
      prompt: enhance(prompt),
      size: $("#size").value,
      quality: $("#quality").value,
      response_format: "url",
      n: 1,
    }),
  });
  if (!response.ok) {
    const t = await response.text();
    try { throw new Error(JSON.parse(t).error || `HTTP ${response.status}`); }
    catch (e) { if (e.message) throw e; throw new Error(`请求失败 (${response.status})`); }
  }
  const data = await response.json();
  const url = data?.data?.[0]?.url || data?.url || data?.image_url;
  if (url && isValidUrl(url)) return url;
  const b64 = data?.data?.[0]?.b64_json;
  if (b64) return `data:image/png;base64,${b64}`;
  throw new Error("未收到图片");
}

async function send() {
  const text = input.value.trim();
  if (!text || generating) return;
  generating = true;
  sendBtn.disabled = true;
  input.value = "";
  autoResize();

  addUserMsg(text);
  const iv = addGenerating();

  try {
    const url = await generateImage(text);
    clearInterval(iv);
    removeGenerating();
    addResultMsg(url);
  } catch (err) {
    clearInterval(iv);
    removeGenerating();
    const msg = err.message || "生成失败";
    addErrorMsg(/not configured|503/i.test(msg) ? "AI 服务暂未配置，请联系管理员。" :
                /too large|413/i.test(msg) ? "描述内容过长，请缩短后重试。" :
                /failed|network/i.test(msg) ? "网络异常，请稍后重试。" : msg);
  } finally {
    generating = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

// ── Auto Reset (exhibit) ──
let resetTimer;
function scheduleReset() {
  if (!isExhibit) return;
  clearTimeout(resetTimer);
  resetTimer = setTimeout(() => {
    conv.innerHTML = "";
    const es = document.createElement("div");
    es.className = "empty-state";
    es.id = "emptyState";
    es.innerHTML = `<div class="empty-icon">✦</div><h2>用文字生成图片</h2><p>描述你想生成的画面，AI 会帮你画出来。</p><div class="presets">
      <button class="preset">星空下的城市</button><button class="preset">可爱的机器猫</button><button class="preset">赛博朋克少女</button><button class="preset">水墨山水画</button><button class="preset">未来城市夜景</button></div>`;
    conv.appendChild(es);
    bindPresets();
  }, 60000);
}
conv.addEventListener("click", scheduleReset);
input.addEventListener("input", scheduleReset);

// ── Download ──
async function downloadImg(src) {
  try {
    if (src.startsWith("data:")) {
      const a = document.createElement("a");
      a.href = src; a.download = `image2-${Date.now()}.png`; a.click();
    } else {
      const r = await fetch(src);
      const b = await r.blob();
      const u = URL.createObjectURL(b);
      const a = document.createElement("a");
      a.href = u; a.download = `image2-${Date.now()}.png`; a.click();
      setTimeout(() => URL.revokeObjectURL(u), 5000);
    }
  } catch { window.open(src, "_blank"); }
}

// ── Lightbox ──
window.openLightbox = (src) => { lbImg.src = src; lightbox.classList.add("show"); };
lightbox.onclick = () => lightbox.classList.remove("show");

// ── Events ──
sendBtn.onclick = send;
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener("input", autoResize);

$("#settingsBtn").onclick = (e) => {
  e.stopPropagation();
  $("#settingsPanel").classList.toggle("show");
};
document.addEventListener("click", (e) => {
  if (!$("#settingsPanel").contains(e.target) && e.target !== $("#settingsBtn")) {
    $("#settingsPanel").classList.remove("show");
  }
});
$("#clearBtn").onclick = () => {
  conv.innerHTML = "";
  const es = document.createElement("div");
  es.className = "empty-state"; es.id = "emptyState";
  es.innerHTML = `<div class="empty-icon">✦</div><h2>用文字生成图片</h2><p>描述你想生成的画面，AI 会帮你画出来。</p><div class="presets">
    <button class="preset">星空下的城市</button><button class="preset">可爱的机器猫</button><button class="preset">赛博朋克少女</button><button class="preset">水墨山水画</button><button class="preset">未来城市夜景</button></div>`;
  conv.appendChild(es);
  bindPresets();
  showToast("已清空对话");
};

function bindPresets() {
  $$(".preset").forEach((btn) => {
    btn.onclick = () => {
      const key = btn.textContent.trim();
      input.value = presetTexts[key] || key;
      autoResize();
      input.focus();
      send();
    };
  });
}
bindPresets();

// ── Load config ──
(async () => {
  try {
    const r = await fetch(resolveEndpoint("/config"));
    if (r.ok) {
      const c = await r.json();
      if (c.model) $(".brand-name").textContent = `AI 画图工坊 · ${c.model}`;
    }
  } catch {}
})();

input.focus();
</script>
</body>
</html>
